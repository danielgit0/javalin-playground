services:
  postgres:
    image: postgres:18.4-alpine
    container_name: postgres
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: javalin
    ports:
      - "5432:5432"
    volumes:
      - ./config/db/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql
    networks:
      - javalin

networks:
  javalin:
    driver: bridge
